# wschat dev stack — compatible with podman-compose / docker compose v2
# Usage:
#   podman-compose up -d        (or: docker compose up -d)
#   podman-compose logs -f

version: "3.9"

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: wschat-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wschat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wschat_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-wschat}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wschat} -d ${POSTGRES_DB:-wschat}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: wschat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: docker.io/minio/minio:latest
    container_name: wschat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  createbuckets:
    image: docker.io/minio/mc:latest
    container_name: wschat-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET:-wschat-media} || true;
      mc anonymous set download local/${MINIO_BUCKET:-wschat-media} || true;
      exit 0;
      "

  livekit:
    image: docker.io/livekit/livekit-server:v1.13.2
    container_name: wschat-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit/config.yaml", "--node-ip=127.0.0.1"]
    ports:
      - "7880:7880"     # HTTP/WS signaling
      - "7881:7881"     # HTTPS signaling (TCP)
      - "50000-50050:50000-50050/udp"  # WebRTC media (limited range for dev)
    volumes:
      - ./livekit.yaml:/etc/livekit/config.yaml:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
